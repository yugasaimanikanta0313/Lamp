<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Deepam{% endblock %}</title>
	<style>
		:root {
			--bg: #0b1020;
			--panel: #111933;
			--panel-2: #18233f;
			--text: #f7f2e8;
			--muted: #c3c6d4;
			--accent: #ff9f43;
			--accent-2: #ffd56b;
			--good: #66d19e;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: radial-gradient(circle at top, #18233f 0, var(--bg) 50%);
			color: var(--text);
			min-height: 100vh;
		}
		.page {
			width: min(1100px, calc(100% - 32px));
			margin: 0 auto;
			padding: 32px 0 48px;
		}
		.flash-stack {
			display: grid;
			gap: 12px;
			margin-bottom: 18px;
		}
		.summary, .panel {
			background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
			border: 1px solid rgba(255,255,255,0.08);
			border-radius: 22px;
			padding: 22px;
			box-shadow: 0 18px 40px rgba(0,0,0,0.28);
		}
		.summary.success { border-color: rgba(102, 209, 158, 0.35); }
		.summary.error { border-color: rgba(255, 180, 180, 0.35); }
	</style>
	{% block extra_head %}{% endblock %}
</head>
<body>
	<main class="page">
			{% if messages %}
			<div class="flash-stack">
				{% for message in messages %}
				<div class="summary {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
				{% endfor %}
			</div>
			{% endif %}
		{% block content %}{% endblock %}
	</main>
</body>
</html>
